<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121214"/>
      <stop offset="100%" stop-color="#1a1a1c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Main monitor frame -->
  <rect x="60" y="35" width="200" height="140" rx="6" fill="#2a2a2d"/>
  <rect x="66" y="41" width="188" height="120" rx="4" fill="url(#screen)"/>
  <!-- Screen content - video timeline -->
  <rect x="76" y="55" width="168" height="40" rx="3" fill="#1a1a1c"/>
  <!-- Video tracks -->
  <rect x="80" y="60" width="60" height="12" rx="2" fill="#c97d5c" opacity="0.6"/>
  <rect x="145" y="60" width="40" height="12" rx="2" fill="#7d9a8e" opacity="0.6"/>
  <rect x="80" y="76" width="90" height="12" rx="2" fill="#c97d5c" opacity="0.4"/>
  <rect x="175" y="76" width="30" height="12" rx="2" fill="#7d9a8e" opacity="0.4"/>
  <!-- Playhead -->
  <line x1="130" y1="55" x2="130" y2="105" stroke="#ece8e3" stroke-width="1.5" opacity="0.8"/>
  <polygon points="130,50 125,42 135,42" fill="#ece8e3" opacity="0.8"/>
  <!-- Play button -->
  <circle cx="155" cy="130" r="14" fill="#c97d5c" opacity="0.2"/>
  <polygon points="151,124 151,136 163,130" fill="#c97d5c" opacity="0.8"/>
  <!-- Right panel - tools -->
  <rect x="280" y="35" width="60" height="140" rx="4" fill="#1a1a1c" stroke="#2a2a2d"/>
  <!-- Tool icons -->
  <rect x="290" y="50" width="40" height="20" rx="3" fill="#2a2a2d"/>
  <circle cx="300" cy="60" r="5" fill="#7d9a8e" opacity="0.6"/>
  <rect x="312" y="57" width="12" height="6" rx="1" fill="#ece8e3" opacity="0.4"/>
  <rect x="290" y="80" width="40" height="20" rx="3" fill="#2a2a2d"/>
  <polygon points="300,86 300,94 308,90" fill="#c97d5c" opacity="0.6"/>
  <rect x="290" y="110" width="40" height="20" rx="3" fill="#2a2a2d"/>
  <rect x="295" y="116" width="30" height="8" rx="1" fill="#ece8e3" opacity="0.3"/>
  <rect x="290" y="140" width="40" height="20" rx="3" fill="#2a2a2d"/>
  <circle cx="310" cy="150" r="6" fill="none" stroke="#7d9a8e" stroke-width="2" opacity="0.6"/>
  <!-- Bottom bar -->
  <rect x="60" y="190" width="280" height="30" rx="4" fill="#121214" stroke="#2a2a2d"/>
  <circle cx="85" cy="205" r="8" fill="#c97d5c" opacity="0.7"/>
  <rect x="110" y="202" width="80" height="6" rx="2" fill="#2a2a2d"/>
  <rect x="110" y="202" width="50" height="6" rx="2" fill="#c97d5c" opacity="0.5"/>
  <circle cx="330" cy="205" r="6" fill="#7d9a8e" opacity="0.5"/>
</svg>
