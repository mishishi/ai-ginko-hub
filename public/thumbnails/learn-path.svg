<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Learning path nodes connected by lines -->
  <line x1="80" y1="80" x2="160" y2="120" stroke="#7d9a8e" stroke-width="2" stroke-dasharray="4"/>
  <line x1="160" y1="120" x2="240" y2="80" stroke="#c97d5c" stroke-width="2" stroke-dasharray="4"/>
  <line x1="240" y1="80" x2="320" y2="120" stroke="#7d9a8e" stroke-width="2" stroke-dasharray="4"/>
  <!-- Node 1 -->
  <circle cx="80" cy="80" r="20" fill="#7d9a8e" opacity="0.2"/>
  <circle cx="80" cy="80" r="12" fill="#7d9a8e" opacity="0.6"/>
  <text x="80" y="84" text-anchor="middle" fill="#ece8e3" font-size="10" font-family="system-ui">1</text>
  <!-- Node 2 -->
  <circle cx="160" cy="120" r="20" fill="#c97d5c" opacity="0.2"/>
  <circle cx="160" cy="120" r="12" fill="#c97d5c"/>
  <text x="160" y="124" text-anchor="middle" fill="#ece8e3" font-size="10" font-family="system-ui">2</text>
  <!-- Node 3 - current -->
  <circle cx="240" cy="80" r="24" fill="#c97d5c" opacity="0.3"/>
  <circle cx="240" cy="80" r="16" fill="#c97d5c"/>
  <text x="240" y="84" text-anchor="middle" fill="#ece8e3" font-size="11" font-family="system-ui">3</text>
  <!-- Node 4 -->
  <circle cx="320" cy="120" r="20" fill="#7d9a8e" opacity="0.2"/>
  <circle cx="320" cy="120" r="12" fill="#7d9a8e" opacity="0.6"/>
  <text x="320" y="124" text-anchor="middle" fill="#ece8e3" font-size="10" font-family="system-ui">4</text>
  <!-- Progress bar -->
  <rect x="60" y="180" width="280" height="6" rx="3" fill="#2a2a2d"/>
  <rect x="60" y="180" width="180" height="6" rx="3" fill="#c97d5c"/>
  <!-- Book icon -->
  <g transform="translate(200, 215)">
    <rect x="-20" y="-10" width="40" height="28" rx="3" fill="#7d9a8e" opacity="0.3"/>
    <rect x="-16" y="-6" width="14" height="20" rx="2" fill="#7d9a8e" opacity="0.5"/>
    <rect x="2" y="-6" width="14" height="20" rx="2" fill="#7d9a8e" opacity="0.7"/>
  </g>
</svg>
