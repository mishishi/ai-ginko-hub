<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c97d5c" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#c97d5c"/>
      <stop offset="100%" stop-color="#7d9a8e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Sound wave bars -->
  <g transform="translate(200,125)">
    <rect x="-120" y="-60" width="8" height="120" rx="4" fill="url(#wave)" opacity="0.3"/>
    <rect x="-100" y="-80" width="8" height="160" rx="4" fill="url(#wave)" opacity="0.5"/>
    <rect x="-80" y="-40" width="8" height="80" rx="4" fill="url(#wave)" opacity="0.4"/>
    <rect x="-60" y="-70" width="8" height="140" rx="4" fill="url(#wave)" opacity="0.6"/>
    <rect x="-40" y="-50" width="8" height="100" rx="4" fill="url(#wave)" opacity="0.7"/>
    <rect x="-20" y="-85" width="8" height="170" rx="4" fill="url(#wave)"/>
    <rect x="0" y="-95" width="8" height="190" rx="4" fill="url(#wave)"/>
    <rect x="20" y="-85" width="8" height="170" rx="4" fill="url(#wave)"/>
    <rect x="40" y="-50" width="8" height="100" rx="4" fill="url(#wave)" opacity="0.7"/>
    <rect x="60" y="-70" width="8" height="140" rx="4" fill="url(#wave)" opacity="0.6"/>
    <rect x="80" y="-40" width="8" height="80" rx="4" fill="url(#wave)" opacity="0.4"/>
    <rect x="100" y="-80" width="8" height="160" rx="4" fill="url(#wave)" opacity="0.5"/>
    <rect x="120" y="-60" width="8" height="120" rx="4" fill="url(#wave)" opacity="0.3"/>
  </g>
  <!-- Microphone icon -->
  <circle cx="200" cy="125" r="24" fill="#c97d5c" opacity="0.15"/>
  <rect x="194" y="100" width="12" height="30" rx="6" fill="#c97d5c" opacity="0.8"/>
  <path d="M188 118 Q188 135 200 135 Q212 135 212 118" stroke="#c97d5c" stroke-width="2" fill="none"/>
