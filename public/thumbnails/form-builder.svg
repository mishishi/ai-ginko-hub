<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Form builder UI mockup -->
  <rect x="60" y="40" width="280" height="170" rx="8" fill="#1a1a1c" stroke="#2a2a2d" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="60" y="40" width="280" height="32" rx="8" fill="#121214"/>
  <rect x="60" y="64" width="280" height="8" fill="#121214"/>
  <circle cx="80" cy="56" r="6" fill="#c97d5c" opacity="0.7"/>
  <circle cx="96" cy="56" r="6" fill="#7d9a8e" opacity="0.7"/>
  <circle cx="112" cy="56" r="6" fill="#c97d5c" opacity="0.4"/>
  <!-- Form fields -->
  <rect x="80" y="90" width="100" height="10" rx="2" fill="#ece8e3" opacity="0.3"/>
  <rect x="80" y="108" width="240" height="28" rx="4" fill="#2a2a2d" stroke="#3a3a3d"/>
  <rect x="80" y="146" width="100" height="10" rx="2" fill="#ece8e3" opacity="0.3"/>
  <rect x="80" y="164" width="240" height="28" rx="4" fill="#2a2a2d" stroke="#c97d5c"/>
  <!-- Toggle -->
  <rect x="80" y="200" width="36" height="18" rx="9" fill="#c97d5c"/>
  <circle cx="107" cy="209" r="7" fill="#ece8e3"/>
  <!-- Drag handle indicators -->
  <g opacity="0.4">
    <rect x="340" y="108" width="6" height="28" rx="2" fill="#ece8e3"/>
    <rect x="348" y="108" width="6" height="28" rx="2" fill="#ece8e3"/>
    <rect x="340" y="164" width="6" height="28" rx="2" fill="#ece8e3"/>
    <rect x="348" y="164" width="6" height="28" rx="2" fill="#ece8e3"/>
  </g>
</svg>
