<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dark base gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="50%" stop-color="#121214"/>
      <stop offset="100%" stop-color="#0d0d10"/>
    </linearGradient>

    <!-- Terracotta accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c97d5c"/>
      <stop offset="100%" stop-color="#b8704e"/>
    </linearGradient>

    <!-- Sage accent gradient -->
    <linearGradient id="sage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7d9a8e"/>
      <stop offset="100%" stop-color="#637a6f"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="glowSmall">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a1a1c" stroke-width="0.5" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow spots -->
  <ellipse cx="300" cy="200" rx="350" ry="250" fill="#c97d5c" opacity="0.04" filter="url(#glow)"/>
  <ellipse cx="900" cy="450" rx="300" ry="200" fill="#7d9a8e" opacity="0.03" filter="url(#glow)"/>

  <!-- Decorative geometric lines -->
  <g stroke="#1a1a1c" stroke-width="1" fill="none" opacity="0.8">
    <line x1="0" y1="70" x2="300" y2="70"/>
    <line x1="0" y1="140" x2="150" y2="140"/>
    <line x1="900" y1="490" x2="1200" y2="490"/>
    <line x1="1050" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Decorative corner bracket -->
  <g stroke="#c97d5c" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 60 60 L 60 100"/>
    <path d="M 60 60 L 100 60"/>
    <path d="M 1140 570 L 1140 530"/>
    <path d="M 1140 570 L 1100 570"/>
  </g>

  <!-- Small accent line -->
  <rect x="60" y="195" width="40" height="2" rx="1" fill="#c97d5c" opacity="0.6"/>

  <!-- Tag pills -->
  <g transform="translate(60, 210)">
    <rect x="0" y="0" width="50" height="22" rx="11" fill="#c97d5c" opacity="0.15"/>
    <text x="25" y="15" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="500" fill="#c97d5c" text-anchor="middle">AI</text>
  </g>
  <g transform="translate(120, 210)">
    <rect x="0" y="0" width="80" height="22" rx="11" fill="#7d9a8e" opacity="0.15"/>
    <text x="40" y="15" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="500" fill="#7d9a8e" text-anchor="middle">TypeScript</text>
  </g>
  <g transform="translate(210, 210)">
    <rect x="0" y="0" width="62" height="22" rx="11" fill="#c97d5c" opacity="0.15"/>
    <text x="31" y="15" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="500" fill="#c97d5c" text-anchor="middle">React</text>
  </g>

  <!-- Main title -->
  <text x="60" y="310" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="500" fill="#ece8e3" letter-spacing="-0.02">
    Ginko<tspan fill="#c97d5c" font-style="italic"> Hub</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="360" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="300" fill="#8a8784" letter-spacing="0.3">
    AI 项目展示 · 从概念到部署
  </text>

  <!-- Decorative dots -->
  <g fill="#2a2a2d" opacity="0.5">
    <circle cx="60" cy="420" r="3"/>
    <circle cx="80" cy="420" r="3"/>
    <circle cx="100" cy="420" r="3"/>
  </g>

  <!-- Right side decorative element - abstract geometric -->
  <g opacity="0.15" transform="translate(900, 100)">
    <polygon points="0,200 100,0 200,200" fill="none" stroke="#c97d5c" stroke-width="1"/>
    <polygon points="30,200 100,40 170,200" fill="none" stroke="#c97d5c" stroke-width="0.5" opacity="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#c97d5c" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 4"/>
  </g>

  <!-- Small decorative circle -->
  <circle cx="1070" cy="160" r="30" fill="none" stroke="#7d9a8e" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom info bar -->
  <g transform="translate(60, 530)">
    <rect x="0" y="0" width="180" height="28" rx="14" fill="none" stroke="#2a2a2d" stroke-width="1"/>
    <text x="90" y="18" font-family="Outfit, system-ui, sans-serif" font-size="11" font-weight="400" fill="#6b6865" text-anchor="middle">Built with AI</text>
  </g>

  <!-- Noise overlay (very subtle) -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.015" filter="url(#noise)"/>
</svg>
