<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- 网格装饰 -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- 装饰圆 -->
  <circle cx="200" cy="520" r="180" fill="#6366f1" opacity="0.04"/>
  <circle cx="1080" cy="120" r="140" fill="#a855f7" opacity="0.04"/>
  <circle cx="640" cy="320" r="300" fill="#ec4899" opacity="0.02"/>

  <!-- 装饰光环 -->
  <ellipse cx="640" cy="320" rx="500" ry="250" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>

  <!-- 顶部装饰线 -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Logo icon - simplified ginkgo leaf -->
  <g transform="translate(200, 200)" opacity="0.15">
    <path d="M0,0 C30,-60 90,-80 120,-40 C150,0 130,60 80,80 C30,100 -30,80 -50,40 C-70,0 -30,60 0,0Z" fill="url(#accent)"/>
  </g>

  <!-- 主标题 -->
  <text x="640" y="270" text-anchor="middle" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif" font-size="96" font-weight="700" fill="url(#titleGrad)" filter="url(#shadow)" letter-spacing="-1">
    Ginko Hub
  </text>

  <!-- 装饰线 -->
  <rect x="480" y="320" width="320" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- 副标题 -->
  <text x="640" y="380" text-anchor="middle" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif" font-size="28" fill="#94a3b8" letter-spacing="6" text-transform="uppercase">
    AI 聚合平台 · 无限访问
  </text>

  <!-- 底部标签 -->
  <rect x="530" y="420" width="220" height="36" rx="18" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="640" y="444" text-anchor="middle" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif" font-size="14" fill="#64748b" letter-spacing="2">
    REACT + TYPESCRIPT + TAILWIND
  </text>

</svg>
